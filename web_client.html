<!DOCTYPE html>
<html>

<head>
    <title>Web Terminal Experiment</title>
    <!-- xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <style>
        body {
            background-color: #0b0b0b;
            color: #fff;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-weight: 300;
            color: #aaa;
        }

        #terminal-container {
            width: 80%;
            height: 70%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            background-color: #1e1e1e;
            border: 1px solid #333;
        }
    </style>
</head>

<body>
    <h1>Telnet Web Client (Approach A)</h1>
    <div id="terminal-container"></div>
    <script>
        const term = new Terminal({
            cursorBlink: true,
            theme: {
                background: '#1e1e1e'
            },
            fontFamily: 'Consolas, "Courier New", monospace',
            fontSize: 14
        });

        term.open(document.getElementById('terminal-container'));
        term.writeln('Welcome to the Experimental Web Terminal!');
        term.writeln('Connecting to server...');

        const ws = new WebSocket('ws://' + window.location.hostname + ':8081');

        ws.onopen = () => {
            term.writeln('\r\n\x1b[32mSuccessfully connected to WebSocket backend.\x1b[0m');
        };

        ws.onmessage = async (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === "output") {
                    term.write(msg.data);
                } else if (msg.type === "completion") {
                    const matches = msg.matches || [];
                    if (matches.length > 0) {
                        if (matches.length === 1) {
                            // Single match: complete it inline
                            const match = matches[0];
                            const words = currentLine.split(' ');
                            const prefix = words[words.length - 1];
                            const toAdd = match.substring(prefix.length);
                            currentLine += toAdd;
                            term.write(toAdd);
                        } else {
                            // Multi-match: Print out options
                            term.write('\r\n' + matches.join('  ') + '\r\n');
                            // Re-print the prompt with the current line
                            const promptMsg = JSON.stringify({ type: 'cmd', command: '' }); // Fake empty to get prompt
                            ws.send(promptMsg);
                        }
                    } else {
                        // no matches, do nothing
                    }
                } else if (msg.type === "rpc_response") {
                    if (rpcResolve) {
                        rpcResolve(msg);
                        rpcResolve = null;
                        rpcReject = null;
                    }
                }
            } catch (e) {
                // Not JSON, assume raw 
                term.write(event.data);
            }
        };

        ws.onclose = () => {
            term.writeln('\r\n\x1b[31mConnection lost.\x1b[0m');
        };

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);

        let currentLine = '';
        let history = [];
        let historyIndex = -1;

        let rpcResolve = null;
        let rpcReject = null;

        function rpcCall(command, args = [], data = "") {
            return new Promise((resolve, reject) => {
                rpcResolve = resolve;
                rpcReject = reject;
                ws.send(JSON.stringify({ type: "rpc", command, args, data }));
            });
        }

        async function handleUpload(remotePath) {
            return new Promise((resolve) => {
                fileInput.value = ''; // clear previous

                const cleanup = () => {
                    window.removeEventListener('focus', onFocus);
                    resolve();
                };

                const onFocus = () => {
                    setTimeout(() => {
                        if (fileInput.files.length === 0) {
                            term.write('\r\nUpload cancelled.\r\n');
                            cleanup();
                        }
                    }, 500);
                };

                window.addEventListener('focus', onFocus);

                fileInput.onchange = async () => {
                    window.removeEventListener('focus', onFocus);
                    const file = fileInput.files[0];
                    if (!file) { resolve(); return; }

                    term.write(`\r\nStarting upload of ${file.name}...\r\n`);
                    const startResp = await rpcCall("upload_start", [remotePath]);
                    if (startResp.status !== "ok") {
                        term.write('Error: ' + startResp.error + '\r\n');
                        resolve(); return;
                    }

                    const chunkSize = 128 * 1024; // 128KB chunks
                    let offset = 0;

                    while (offset < file.size) {
                        const chunk = file.slice(offset, offset + chunkSize);
                        const base64Str = await new Promise(r => {
                            const reader = new FileReader();
                            reader.onload = e => r(e.target.result.split(',')[1]);
                            reader.readAsDataURL(chunk);
                        });

                        const chunkResp = await rpcCall("upload_chunk", [], base64Str);
                        if (chunkResp.status !== "ok") {
                            term.write('\r\nError chunk: ' + chunkResp.error + '\r\n');
                            resolve(); return;
                        }

                        offset += chunk.size;
                        const pct = Math.min(100, Math.round((offset / file.size) * 100));
                        term.write(`\r\x1b[KUploading... ${pct}% (${offset}/${file.size} bytes)`);
                    }

                    const endResp = await rpcCall("upload_end");
                    if (endResp.status === "ok") {
                        term.write('\r\nUpload complete.\r\n');
                    } else {
                        term.write('\r\nError ending upload: ' + endResp.error + '\r\n');
                    }
                    resolve();
                };

                try {
                    fileInput.click();
                } catch (e) {
                    term.write('\r\nError opening file picker: ' + e + '\r\n');
                    cleanup();
                }
            });
        }

        async function handleDownload(remoteFile, localName) {
            term.write(`\r\nRequesting download of ${remoteFile}...\r\n`);
            const reqResp = await rpcCall("download_req", [remoteFile]);
            if (reqResp.status !== "ok") {
                term.write('Error: ' + reqResp.error + '\r\n');
                return;
            }

            const filesize = reqResp.filesize || 0;
            let downloaded = 0;
            let downloading = true;
            const chunks = [];

            while (downloading) {
                const chunkResp = await rpcCall("download_chunk");
                if (chunkResp.status === "done") {
                    downloading = false;
                } else if (chunkResp.status === "ok") {
                    const byteCharacters = atob(chunkResp.data);
                    const byteNumbers = new Uint8Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    chunks.push(byteNumbers);
                    downloaded += byteNumbers.length;

                    if (filesize > 0) {
                        const pct = Math.min(100, Math.round((downloaded / filesize) * 100));
                        term.write(`\r\x1b[KDownloading... ${pct}% (${downloaded}/${filesize} bytes)`);
                    } else {
                        term.write(`\r\x1b[KDownloaded ${downloaded} bytes`);
                    }
                } else {
                    term.write('\r\nError chunk: ' + chunkResp.error + '\r\n');
                    return;
                }
            }

            const blob = new Blob(chunks);
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = localName || remoteFile.split('/').pop() || 'downloaded_file';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);

            term.write('\r\nDownload complete.\r\n');
        }

        term.onData(async e => {
            if (e === '\r') { // Enter
                term.write('\r\n');
                const line = currentLine.trim();

                if (line) {
                    history.push(line);
                    historyIndex = history.length;

                    if (line.startsWith("upload ")) {
                        const parts = line.split(" ");
                        if (parts.length < 2) {
                            term.write('Usage: upload <remote_path>\r\n');
                            ws.send(JSON.stringify({ type: 'cmd', command: '' })); // trigger prompt
                        } else {
                            await handleUpload(parts[1]);
                            ws.send(JSON.stringify({ type: 'cmd', command: '' })); // trigger prompt
                        }
                    } else if (line.startsWith("download ")) {
                        const parts = line.split(" ");
                        if (parts.length < 2) {
                            term.write('Usage: download <remote_file> [local_name]\r\n');
                            ws.send(JSON.stringify({ type: 'cmd', command: '' })); // trigger prompt
                        } else {
                            await handleDownload(parts[1], parts[2]);
                            ws.send(JSON.stringify({ type: 'cmd', command: '' })); // trigger prompt
                        }
                    } else {
                        ws.send(JSON.stringify({ type: 'cmd', command: currentLine }));
                    }
                } else {
                    ws.send(JSON.stringify({ type: 'cmd', command: currentLine }));
                }
                currentLine = '';
            } else if (e === '\x7F') { // Backspace
                if (currentLine.length > 0) {
                    currentLine = currentLine.slice(0, -1);
                    term.write('\b \b');
                }
            } else if (e === '\x1b[A') { // Up arrow
                if (historyIndex > 0) {
                    historyIndex--;
                    // Erase current
                    while (currentLine.length > 0) {
                        term.write('\b \b');
                        currentLine = currentLine.slice(0, -1);
                    }
                    currentLine = history[historyIndex];
                    term.write(currentLine);
                }
            } else if (e === '\x1b[B') { // Down arrow
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    while (currentLine.length > 0) {
                        term.write('\b \b');
                        currentLine = currentLine.slice(0, -1);
                    }
                    currentLine = history[historyIndex];
                    term.write(currentLine);
                } else if (historyIndex === history.length - 1) {
                    historyIndex++;
                    while (currentLine.length > 0) {
                        term.write('\b \b');
                        currentLine = currentLine.slice(0, -1);
                    }
                }
            } else if (e === '\t') { // Tab
                const words = currentLine.split(' ');
                if (words.length > 1) {
                    const prefix = words[words.length - 1];
                    ws.send(JSON.stringify({ type: 'cmd', command: `complete ${prefix}` }));
                }
            } else {
                // Filter out non-printable ansi for normal typing
                if (e >= String.fromCharCode(0x20) && e <= String.fromCharCode(0x7E)) {
                    currentLine += e;
                    term.write(e);
                }
            }
        });
    </script>
</body>

</html>
